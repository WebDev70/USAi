# CI for USAi Chat — runs the test suite + coverage gates + security scan on every push / PR.
#
# This workflow IS the CI contract — it mirrors `make check` exactly:
#   1. JS syntax gate + unit tests + JS coverage gate (node --test)
#   2. Python syntax gate + unit/integration tests + server.py coverage gate (coverage.py)
#   3. DevSecOps scan: gitleaks + bandit --strict + pip-audit (scripts/security-scan.sh --strict)
#
# Local equivalent: `make check` (see Makefile).
# Dependency-light on purpose — the only RUNTIME dep is python-dotenv (matching
# requirements.txt); all other tooling (coverage, bandit, pip-audit, gitleaks) is
# DEV/CI-ONLY per docs/principles.md §1 and is never shipped in the app.
name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  javascript:
    name: JS unit tests + coverage (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node >= 22 so the built-in --experimental-test-coverage is available
          # (used by the dev-only coverage gate; no third-party deps).
          node-version: "22"
      - name: Syntax check (app.js)
        run: node --check app.js
      - name: Run JS unit tests
        # Use `find` to enumerate the test files explicitly. This is portable
        # across Node versions (directory args to `node --test` need Node >= 21)
        # and avoids relying on bash globstar (`**`), which is off in CI shells.
        run: node --test $(find tests/js -name '*.test.mjs')
      - name: JS coverage gate (exported helpers)
        run: node tests/js-coverage.mjs 70

  python:
    name: Python unit tests + coverage (unittest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the documented baseline (3.9) and a current release.
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime dependency + dev-only coverage tool
        # Split into two separate pip invocations so the hash-pinned requirements.txt
        # (which activates --require-hashes mode) does not contaminate the bare
        # `coverage` install. This mirrors what `make setup` does locally.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      - name: Syntax check (server.py)
        run: python -m py_compile server.py
      - name: Run Python tests with branch coverage gate
        # .coveragerc branch=True enables branch measurement (RAIL Phase 2).
        # We enforce two independent thresholds that mirror run-tests.sh --coverage:
        #   • Line coverage:   fail_under=90% (coverage.py --fail-under)
        #   • Branch coverage: PY_BRANCH_MIN=80% (extracted from coverage JSON)
        # The ratchet guard is run-tests.sh-only because scripts/ratchet-check.sh
        # requires bash 4+ which is not guaranteed on all CI images; the two gates
        # above are sufficient to catch regressions in CI. (#39)
        run: |
          python -m coverage run --branch -m unittest discover -s tests/python -p 'test_*.py'
          python -m coverage report -m
          python -m coverage report --fail-under=90
          python -m coverage json -o /tmp/coverage.json
          python - <<'EOF'
          import json, sys
          d = json.load(open('/tmp/coverage.json'))
          s = d['files']['server.py']['summary']
          nb = s['num_branches']
          cb = s['covered_branches']
          pct = (cb / nb * 100) if nb > 0 else 100.0
          branch_int = int(pct)
          print(f'server.py branch coverage: {pct:.2f}%')
          if branch_int < 80:
              print(f'FAIL: branch coverage {pct:.2f}% is below 80% threshold — add tests.')
              sys.exit(1)
          else:
              print(f'PASS: branch coverage >= 80%')
          EOF

  security:
    name: DevSecOps scan (secrets + SAST + dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan past commits for leaked secrets.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev-only scanners (never shipped in the app)
        # SAST + dependency-CVE tooling. These are DEV/CI ONLY per docs/principles.md
        # §1 — not added to requirements.txt and not imported by the app.
        run: python -m pip install --upgrade pip && pip install bandit pip-audit
      - name: Secret scan (gitleaks)
        # Deterministic secret detection across the working tree AND git history.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: SAST (bandit on server.py)
        # -ll = report medium+ severity; server.py is the only first-party Python.
        run: bandit -ll -r server.py
      - name: Dependency CVE audit (pip-audit)
        # GHSA-mf9w-mj56-hr94 is ignored with justification (see
        # scripts/security-scan.sh): python-dotenv set_key/unset_key symlink issue
        # fixed in 1.2.2 and not exploitable here (app only calls load_dotenv).
        run: pip-audit --ignore-vuln GHSA-mf9w-mj56-hr94 -r requirements.txt
