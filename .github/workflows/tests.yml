# CI for USAi Chat — runs the zero-dependency test suite on every push / PR.
#
# Mirrors ./run-tests.sh: syntax gates + JS (node --test) + Python (unittest).
# Kept dependency-light on purpose — the only install is python-dotenv (so that
# `import server` succeeds), matching requirements.txt.
name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  javascript:
    name: JS unit tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (app.js)
        run: node --check app.js
      - name: Run JS unit tests
        run: node --test "tests/js/**/*.test.mjs"

  python:
    name: Python unit tests (unittest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the documented baseline (3.9) and a current release.
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime dependency
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Syntax check (server.py)
        run: python -m py_compile server.py
      - name: Run Python unit tests
        run: python -m unittest discover -s tests/python -p 'test_*.py'
