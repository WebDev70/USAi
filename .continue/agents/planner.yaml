name: Code Planner
version: 0.0.1
schema: v1
# RAIL agent mode — Code Planner (Step 1). Produces a structured plan BEFORE any
# non-trivial edit. See .continue/rules/code-planner.md for the full behavior and
# the required plan template.
rules:
  - file://.continue/rules/code-planner.md
  - file://.continue/rules/tdd-workflow.md
prompts:
  - name: plan
    description: Produce a RAIL implementation plan for the requested change
    prompt: |
      Act as the Code Planner. First RECALL relevant prior context from the
      Obsidian vault (Continue Extension/memories/ and USAi/memories/). Then output
      a brief, scannable plan using the template:
        1. Goal & scope (what / why; what's out of scope)
        2. Affected files (+ any new files)
        3. Approach (functions/endpoints; conventions: tool-gating, /config
           redaction, path-traversal guards, no new runtime deps, CSS ?v=N bump)
        4. Test plan (specific cases → which test file; TESTS FIRST per TDD)
        5. Docs to update (CHANGELOG / USER_GUIDE / README / backlog / CONTINUE /
           AGENTS)
        6. Risks / edge cases / security implications
      For larger changes, pause for my confirmation before implementing.
